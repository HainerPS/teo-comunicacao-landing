<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Téo Comunicação</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="login-container" id="loginContainer">
    <h2>Área Administrativa</h2>
    <input type="password" id="password" placeholder="Senha" />
    <button onclick="login()">Entrar</button>
  </div>

  <div class="dashboard" id="dashboard" style="display: none;">
    
    <h2>Leads Recebidos</h2>

    <!-- 🔥 NOVO: FILTROS -->
    <div class="filters">
      <button onclick="setFilter('')">Todos</button>
      <button onclick="setFilter('Landing Page')">Landing Page</button>
      <button onclick="setFilter('Site Institucional')">Site</button>
    </div>

    <div class="actions">
      <button onclick="exportCSV()">Exportar CSV</button>
      <button onclick="logout()">Sair</button>
    </div>

    <div id="leadsList"></div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
