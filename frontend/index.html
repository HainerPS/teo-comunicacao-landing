<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Téo Comunicação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>TÉO</h1>
    <h2>COMUNICAÇÃO QUE GERA RESULTADO</h2>

    <p class="cta">
      Transforme sua comunicação em performance real.
    </p>

    <form id="leadForm">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="Email corporativo" required />
      <input type="text" id="telefone" placeholder="Telefone" />
      <input type="text" id="empresa" placeholder="Empresa" />
      <textarea id="mensagem" placeholder="Mensagem"></textarea>

      <button type="submit">Quero mais resultados</button>
    </form>

    <p class="success" id="successMsg">Lead enviado com sucesso!</p>
    <p class="error" id="errorMsg">Erro ao enviar. Tente novamente.</p>
  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
